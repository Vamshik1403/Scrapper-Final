<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GarageLeadsPro</title>
    <style>
        :root {
            --bg-body: #0b1120;
            --bg-card: #111827;
            --bg-input: #1e293b;
            --border: #1e293b;
            --border-hover: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-red: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s ease forwards;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: center;
        }
        .login-logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: #fff;
        }
        .login-logo h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .login-logo h1 span { color: var(--accent-purple); }
        .login-subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent-purple);
        }
        .pw-wrapper {
            position: relative;
        }
        .pw-wrapper input {
            padding-right: 42px;
        }
        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            line-height: 1;
            transition: color 0.2s;
        }
        .pw-toggle:hover {
            color: var(--text-primary);
        }
        .login-btn {
            width: 100%;
            padding: 11px 0;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .login-btn:hover { filter: brightness(1.1); }
        .login-btn:active { transform: scale(0.98); }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">G</div>
            <h1>Garage<span>Leads</span>Pro</h1>
        </div>
        <p class="login-subtitle">Sign in to your account</p>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrapper">
                    <input type="password" name="password" id="login-password" autocomplete="current-password" required>
                    <button type="button" class="pw-toggle" onclick="togglePw('login-password', this)" title="Show password">&#x1F441;</button>
                </div>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
    <script>
    function togglePw(inputId, btn) {
        var inp = document.getElementById(inputId);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.innerHTML = '&#x1F6AB;';
            btn.title = 'Hide password';
        } else {
            inp.type = 'password';
            btn.innerHTML = '&#x1F441;';
            btn.title = 'Show password';
        }
    }
    </script>
</body>
</html>
